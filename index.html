<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Study Tracker">
<title>Study Tracker · Mar 27 – Apr 3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#0f0f11; --surface:#1a1a1f; --surface2:#222228;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.16);
  --text:#f0efe8; --muted:#888780; --hint:#4a4947;
  --green:#3ecf8e; --green-bg:rgba(62,207,142,0.1); --green-border:rgba(62,207,142,0.25);
  --blue:#60a5fa; --blue-bg:rgba(96,165,250,0.1); --blue-border:rgba(96,165,250,0.22);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,0.1); --amber-border:rgba(245,158,11,0.25);
  --purple:#a78bfa; --purple-bg:rgba(167,139,250,0.1); --purple-border:rgba(167,139,250,0.25);
  --red:#ef4444; --red-bg:rgba(239,68,68,0.1); --red-border:rgba(239,68,68,0.25);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{padding:48px 18px 0;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.week-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);background:var(--green-bg);border:1px solid var(--green-border);padding:3px 8px;border-radius:20px;letter-spacing:.05em;display:inline-block;margin-bottom:4px}
.header h1{font-size:20px;font-weight:600}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px;margin-bottom:12px}
.tabs{display:flex}
.tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;user-select:none}
.tab.active-today{color:var(--blue);border-bottom-color:var(--blue)}
.tab.active-week{color:var(--amber);border-bottom-color:var(--amber)}
.tab.active-summary{color:var(--purple);border-bottom-color:var(--purple)}

.tab-content{display:none;padding:14px 18px 60px}
.tab-content.active{display:block}

.day-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.day-nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.day-nav-btn:active{background:var(--surface2)}
.day-nav-center{flex:1;text-align:center}
.day-nav-name{font-size:16px;font-weight:600;color:var(--text)}
.day-nav-date{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:2px}
.today-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--blue);margin-left:6px;vertical-align:middle}

.time-block-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 15px;margin-bottom:14px}
.time-block-title{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-bottom:10px}
.time-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.time-row:last-child{margin-bottom:0}
.time-lbl{font-size:13px;color:var(--muted);min-width:48px}
.time-select{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;-webkit-appearance:none;cursor:pointer}
.time-select:focus{outline:none;border-color:var(--blue)}

.section-lbl{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin:14px 0 8px;display:flex;align-items:center;gap:7px}
.section-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.task-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:9px;overflow:hidden;transition:border-color .2s}
.task-card.open{border-color:var(--border2)}
.task-top{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;user-select:none;-webkit-user-select:none}
.task-top:active{background:rgba(255,255,255,0.02)}
.task-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.04em}
.badge-office{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge-home{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-both{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.task-info{flex:1;min-width:0}
.t-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.t-detail{font-size:11px;color:var(--hint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-time-pill{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:8px;flex-shrink:0;background:var(--surface2);color:var(--muted);border:1px solid var(--border);white-space:nowrap}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--hint);transition:background .2s}
.sd-done{background:var(--green)}
.sd-partial{background:var(--amber)}
.sd-skip{background:var(--red)}
.chevron{width:14px;height:14px;flex-shrink:0;color:var(--hint);transition:transform .2s}
.task-card.open .chevron{transform:rotate(180deg)}

.task-bottom{border-top:1px solid var(--border);padding:12px 14px;display:none;background:rgba(0,0,0,0.1)}
.task-card.open .task-bottom{display:block}
.status-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.status-row:last-child{margin-bottom:0}
.status-lbl{font-size:12px;color:var(--muted);min-width:68px;flex-shrink:0}
.status-select{flex:1;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;-webkit-appearance:none;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);transition:background .2s,border-color .2s,color .2s}
.status-select:focus{outline:none}
.s-done{background:var(--green-bg)!important;border-color:var(--green-border)!important;color:var(--green)!important}
.s-partial{background:var(--amber-bg)!important;border-color:var(--amber-border)!important;color:var(--amber)!important}
.s-skip{background:var(--red-bg)!important;border-color:var(--red-border)!important;color:var(--red)!important}
.s-pending{background:var(--surface2)!important;border-color:var(--border2)!important;color:var(--muted)!important}
.notes-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;resize:none}
.notes-input::placeholder{color:var(--hint)}
.notes-input:focus{outline:none;border-color:var(--blue-border)}

.mini-stats{display:flex;gap:8px;margin-bottom:12px}
.mini-stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center}
.mini-num{font-size:19px;font-weight:600;font-family:'DM Mono',monospace}
.mini-lbl{font-size:10px;color:var(--hint);margin-top:2px}
.c-blue{color:var(--blue)}.c-amber{color:var(--amber)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-purple{color:var(--purple)}
.progress-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:3px;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pf-blue{background:var(--blue)}.pf-amber{background:var(--amber)}.pf-purple{background:var(--purple)}.pf-green{background:var(--green)}
.progress-row{display:flex;justify-content:space-between;font-size:10px;font-family:'DM Mono',monospace;color:var(--hint);margin-bottom:14px}

.week-day-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;user-select:none;transition:border-color .15s}
.week-day-row:active{background:var(--surface2)}
.week-day-row.is-today{border-color:var(--blue-border)}
.wdr-name{font-size:13px;font-weight:500;color:var(--text);min-width:76px}
.wdr-date{font-size:10px;color:var(--hint);font-family:'DM Mono',monospace;margin-top:1px}
.wdr-bar-wrap{flex:1}
.wdr-bar-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.wdr-bar-fill{height:4px;border-radius:2px;background:var(--green);transition:width .4s}
.wdr-pct{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);min-width:34px;text-align:right}
.wdr-dots{display:flex;gap:4px;flex-shrink:0}
.wdr-dot{width:6px;height:6px;border-radius:50%}

.summary-section{margin-bottom:18px}
.summary-title{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-bottom:8px}
.s-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:7px}
.s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-pcts{text-align:right;flex-shrink:0}
.s-pct-done{font-family:'DM Mono',monospace;font-size:12px}
.s-pct-left{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);margin-top:2px}
.big-pct{font-size:38px;font-weight:600;font-family:'DM Mono',monospace;color:var(--purple);text-align:center}
.big-sub{font-size:13px;color:var(--muted);text-align:center;margin-top:2px;margin-bottom:16px}
.reset-btn{margin-top:16px;width:100%;padding:11px;background:transparent;border:1px solid var(--border2);border-radius:12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:background .15s}
.reset-btn:active{background:var(--surface2)}
.reminder-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.btn-reminder{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--green-border);background:var(--green-bg);color:var(--green);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:background .15s}
.btn-reminder:active{background:rgba(62,207,142,0.22)}
.btn-reminder.active{background:rgba(62,207,142,0.2);border-color:var(--green)}
.btn-cancel-rem{padding:8px 11px;border-radius:8px;border:1px solid var(--red-border);background:var(--red-bg);color:var(--red);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-cancel-rem:active{background:rgba(239,68,68,0.22)}
.rem-status{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:12px;padding-left:2px}
.notif-bar{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--amber);margin-bottom:12px;display:none;line-height:1.5}
.notif-bar.show{display:block}
</style>
</head>
<body>

<div class="header">
  <div class="week-badge">MAR 27 – APR 4 · 2026</div>
  <h1>Study Tracker</h1>
  <div class="header-sub">Python · SQL · Business · Analytics</div>
  <div class="tabs">
    <div class="tab active-today" id="tab-today"   onclick="switchTab('today')"  >Today</div>
    <div class="tab"              id="tab-week"    onclick="switchTab('week')"   >Week</div>
    <div class="tab"              id="tab-summary" onclick="switchTab('summary')">Summary</div>
  </div>
</div>

<!-- TODAY TAB -->
<div class="tab-content active" id="content-today">
  <div class="day-nav">
    <button class="day-nav-btn" onclick="shiftDay(-1)">&#8249;</button>
    <div class="day-nav-center">
      <div class="day-nav-name" id="nav-name">Friday</div>
      <div class="day-nav-date" id="nav-date">Mar 27 · Weekday</div>
    </div>
    <button class="day-nav-btn" onclick="shiftDay(1)">&#8250;</button>
  </div>

  <div id="today-tasks"></div>
</div>

<!-- WEEK TAB -->
<div class="tab-content" id="content-week">
  <div class="mini-stats">
    <div class="mini-stat"><div class="mini-num c-green" id="w-done-pct">0%</div><div class="mini-lbl">complete</div></div>
    <div class="mini-stat"><div class="mini-num c-red"   id="w-left-pct">100%</div><div class="mini-lbl">incomplete</div></div>
    <div class="mini-stat"><div class="mini-num"         id="w-prog">0/0</div><div class="mini-lbl">tasks</div></div>
  </div>
  <div class="progress-track"><div class="progress-fill pf-purple" id="w-bar" style="width:0%"></div></div>
  <div class="progress-row"><span>0%</span><span>week progress</span><span>100%</span></div>
  <div id="week-days"></div>
</div>

<!-- SUMMARY TAB -->
<div class="tab-content" id="content-summary">
  <div class="big-pct" id="s-total-pct">0%</div>
  <div class="big-sub">overall completion</div>
  <div class="progress-track"><div class="progress-fill pf-purple" id="s-bar" style="width:0%"></div></div>
  <div class="progress-row"><span>0</span><span id="s-prog">0 / 0</span><span id="s-right">0</span></div>
  <div class="summary-section">
    <div class="summary-title">Office tasks</div>
    <div id="sum-office"></div>
  </div>
  <div class="summary-section">
    <div class="summary-title">Home tasks</div>
    <div id="sum-home"></div>
  </div>
  <div class="summary-section">
    <div class="summary-title">Daily tasks</div>
    <div id="sum-daily"></div>
  </div>
  <button class="reset-btn" onclick="resetAll()">Reset everything</button>
</div>

<script>
const SK = 'st_mar27_v1';

const DAYS = [
  {key:'f27', label:'Friday',    short:'FRI', date:'Mar 27', type:'weekday'},
  {key:'sa28',label:'Saturday',  short:'SAT', date:'Mar 28', type:'weekend'},
  {key:'su29',label:'Sunday',    short:'SUN', date:'Mar 29', type:'weekend'},
  {key:'m30', label:'Monday',    short:'MON', date:'Mar 30', type:'weekday'},
  {key:'t31', label:'Tuesday',   short:'TUE', date:'Mar 31', type:'weekday'},
  {key:'w1',  label:'Wednesday', short:'WED', date:'Apr 1',  type:'weekday'},
  {key:'th2', label:'Thursday',  short:'THU', date:'Apr 2',  type:'weekday'},
  {key:'f3',  label:'Friday',    short:'FRI', date:'Apr 3',  type:'weekday'},
  {key:'sa4', label:'Saturday',  short:'SAT', date:'Apr 4',  type:'weekend'},
];

const TASKS = [
  // OFFICE
  {id:'w4a',   name:'Week 4a – Python project (self)',
   detail:'@office · Mar 30 & 31',
   type:'office', time:'30–45 min',
   days:['m30','t31']},

  {id:'mod20', name:'Module 2.0 – Python',
   detail:'@office · Mar 30 & 31',
   type:'office', time:'30–45 min',
   days:['m30','t31']},

  {id:'biz',   name:'12.0 Business + 24.0 A/B + 25.0 Biz Case + 26.0 Exp Case',
   detail:'@office · all 4 on same schedule',
   type:'office', time:'30 min',
   days:['f27','m30','t31','w1','th2','f3']},

  {id:'anly',  name:'29.0 Analytics Engineering',
   detail:'@office · till Mar 31, then Apr 1–3',
   type:'office', time:'30 min',
   days:['f27','m30','t31','w1','th2','f3']},

  // HOME
  {id:'np',    name:'Week 2 (Numpy) + Week 3 (Pandas)',
   detail:'@home · 40 qs/day · Mar 27 – Apr 4',
   type:'home', time:'1–2 hr',
   days:['f27','sa28','su29','m30','t31','w1','th2','f3','sa4']},

  {id:'w4g',   name:'Week 4 – Project (guided)',
   detail:'@home · 1 project/day · Mar 28 – Apr 4',
   type:'home', time:'1 hr',
   days:['sa28','su29','m30','t31','w1','th2','f3','sa4']},

  {id:'sql',   name:'3.0 SQL',
   detail:'@home · 30 qs/day · Mar 28 – Apr 4',
   type:'home', time:'1 hr',
   days:['sa28','su29','m30','t31','w1','th2','f3','sa4']},

  {id:'apti',  name:'13.0 Aptitude',
   detail:'@home · weekend only',
   type:'home', time:'2 hr',
   days:['sa28','su29']},

  // DAILY
  {id:'mock',  name:'30.0 Mock Interview',
   detail:'Mar 30 – Apr 13 · all interviews',
   type:'both', time:'varies',
   days:['m30','t31','w1','th2','f3']},

  {id:'apply', name:'Apply – job applications',
   detail:'Daily · 1 hr',
   type:'both', time:'1 hr',
   days:['f27','sa28','su29','m30','t31','w1','th2','f3','sa4']},
];

// ── STATE ─────────────────────────────────────────────────────────────────
function gs(){ try{ return JSON.parse(localStorage.getItem(SK)||'{}'); }catch(e){ return {}; } }
function ss(s){ localStorage.setItem(SK,JSON.stringify(s)); }
function tsk(tid,dk){ return 'ts_'+tid+'_'+dk; }
function tnk(tid,dk){ return 'tn_'+tid+'_'+dk; }

// ── DAY INDEX ─────────────────────────────────────────────────────────────
let curIdx = 0;

function todayIdx(){
  const now=new Date(), m=now.getMonth(), d=now.getDate();
  if(m===2){ return ({27:0,28:1,29:2,30:3,31:4})[d]??0; }
  if(m===3){ return ({1:5,2:6,3:7,4:8})[d]??8; }
  return 0;
}

function shiftDay(dir){
  curIdx = Math.max(0,Math.min(DAYS.length-1,curIdx+dir));
  renderToday();
}

// ── TIME SELECTS ──────────────────────────────────────────────────────────
function buildTimeOpts(){
  let html='<option value="">-- time --</option>';
  // 10:00 AM to 11:30 PM (same day)
  for(let h=10;h<=23;h++){
    for(let m=0;m<60;m+=30){
      const hh=String(h).padStart(2,'0'), mm=String(m).padStart(2,'0');
      const ampm=h<12?'AM':'PM', h12=h>12?h-12:(h===12?12:h);
      html+=`<option value="${hh}:${mm}">${h12}:${mm} ${ampm}</option>`;
    }
  }
  // 12:00 AM to 3:00 AM (next calendar day, labelled as "next day")
  for(let h=0;h<=3;h++){
    for(let m=0;m<60;m+=30){
      if(h===3&&m>0) break;
      const hh=String(h).padStart(2,'0'), mm=String(m).padStart(2,'0');
      const label=h===0?`12:${mm} AM (next day)`:`${h}:${mm} AM (next day)`;
      html+=`<option value="n${hh}:${mm}">${label}</option>`;
    }
  }
  return html;
}

const TIME_OPTS_HTML = buildTimeOpts();

// ── STATUS ────────────────────────────────────────────────────────────────
const SOPTS=[
  {val:'pending', label:'Not started'},
  {val:'done',    label:'Completed ✓'},
  {val:'partial', label:'Partially done'},
  {val:'skip',    label:'Unable to attempt'},
];

function scls(v){ return {done:'s-done',partial:'s-partial',skip:'s-skip',pending:'s-pending'}[v]||'s-pending'; }
function sdcls(v){ return {done:'sd-done',partial:'sd-partial',skip:'sd-skip'}[v]||''; }

// ── RENDER TODAY ──────────────────────────────────────────────────────────
function renderToday(){
  const day=DAYS[curIdx], ti=todayIdx();
  document.getElementById('nav-name').innerHTML =
    day.label+(curIdx===ti?'<span class="today-dot"></span>':'');
  document.getElementById('nav-date').textContent =
    day.date+' · '+(day.type==='weekend'?'Weekend':'Weekday');

  const tasks=TASKS.filter(t=>t.days.includes(day.key));
  const state=gs();
  const cont=document.getElementById('today-tasks');
  cont.innerHTML='';

  if(!tasks.length){
    cont.innerHTML='<div style="text-align:center;color:var(--hint);font-size:13px;padding:30px 0">No tasks scheduled.</div>';
    return;
  }

  const officeTasks = tasks.filter(t=>t.type==='office');
  const homeTasks   = tasks.filter(t=>t.type==='home');
  const bothTasks   = tasks.filter(t=>t.type==='both');

  function grp(list, lbl, dotClr, which){
    if(!list.length) return;
    const el=document.createElement('div');
    el.className='section-lbl';
    el.innerHTML=`<span class="section-dot" style="background:${dotClr}"></span>${lbl}`;
    cont.appendChild(el);
    list.forEach(t=>cont.appendChild(makeCard(t,day.key,state)));
  }

  grp(officeTasks,'Office','var(--blue)',  'ofc');
  grp(homeTasks,  'Home',  'var(--amber)', 'hme');
  grp(bothTasks,  'Daily', 'var(--purple)', 'daily');
}

function tbtsk(tid,dk){ return 'tbt_'+tid+'_'+dk; }

function saveTaskTime(tid,dk){
  const s=gs();
  const startEl=document.getElementById('tbs_'+tid+'_'+dk);
  const endEl  =document.getElementById('tbe_'+tid+'_'+dk);
  if(!startEl||!endEl) return;
  s[tbtsk(tid,dk)]={start:startEl.value, end:endEl.value};
  ss(s);
}

function makeCard(task,dk,state){
  const val  = state[tsk(task.id,dk)]||'pending';
  const notes= state[tnk(task.id,dk)]||'';
  const tb   = state[tbtsk(task.id,dk)]||{};
  const bcls = {office:'badge-office',home:'badge-home',both:'badge-both'}[task.type];
  const btxt = {office:'OFC',home:'HME',both:'ALL'}[task.type];
  const sopts= SOPTS.map(o=>`<option value="${o.val}"${val===o.val?' selected':''}>${o.label}</option>`).join('');
  const startId=`tbs_${task.id}_${dk}`, endId=`tbe_${task.id}_${dk}`;

  const tbSummary = (tb.start&&tb.end) ? `${fmt12(tb.start)} – ${fmt12(tb.end)}` : '';

  const card=document.createElement('div');
  card.className='task-card';
  card.id='card_'+task.id+'_'+dk;
  card.innerHTML=`
    <div class="task-top" onclick="toggleCard('${task.id}','${dk}')">
      <div class="task-badge ${bcls}">${btxt}</div>
      <div class="task-info">
        <div class="t-name">${task.name}</div>
        <div class="t-detail">${tbSummary ? tbSummary : task.detail}</div>
      </div>
      <span class="status-dot ${sdcls(val)}"></span>
      <div class="t-time-pill">${task.time}</div>
      <svg class="chevron" viewBox="0 0 14 14" fill="none"><path d="M2 4.5L7 9.5L12 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="task-bottom">
      <div class="time-block-title" style="margin-bottom:8px">Time block</div>
      <div class="time-row" style="margin-bottom:6px">
        <span class="time-lbl">Start</span>
        <select class="time-select" id="${startId}" onchange="saveTaskTime('${task.id}','${dk}')">
          ${TIME_OPTS_HTML}
        </select>
      </div>
      <div class="time-row" style="margin-bottom:10px">
        <span class="time-lbl">End</span>
        <select class="time-select" id="${endId}" onchange="saveTaskTime('${task.id}','${dk}')">
          ${TIME_OPTS_HTML}
        </select>
      </div>
      <div class="reminder-row">
        <button class="btn-reminder" id="rembtn_${task.id}_${dk}" onclick="setAlarm('${task.id}','${dk}')">
          Set alarm at start time
        </button>
      </div>
      <div class="rem-status" id="remstatus_${task.id}_${dk}">${tb.start ? `Tap to set alarm at ${fmt12(tb.start)}` : `Set a start time first`}</div>
      <div class="status-row">
        <span class="status-lbl">Status</span>
        <select class="status-select ${scls(val)}" onchange="updateStatus('${task.id}','${dk}',this)">${sopts}</select>
      </div>
      <div class="status-row" style="align-items:flex-start">
        <span class="status-lbl" style="padding-top:6px">Notes</span>
        <textarea class="notes-input" rows="2" placeholder="Add notes…" onchange="updateNotes('${task.id}','${dk}',this)">${notes}</textarea>
      </div>
    </div>`;

  // restore saved time values after innerHTML is set
  setTimeout(()=>{
    const se=document.getElementById(startId), ee=document.getElementById(endId);
    if(se) se.value=tb.start||'';
    if(ee) ee.value=tb.end||'';
  },0);

  return card;
}

function fmt12(val){
  if(!val) return '';
  const nextDay = val.startsWith('n');
  const clean = nextDay ? val.slice(1) : val;
  const [h,m]=clean.split(':').map(Number);
  const ampm=h<12?'AM':'PM', h12=h===0?12:(h>12?h-12:h);
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}${nextDay?' (+next day)':''}`;
}

function toggleCard(tid,dk){
  const c=document.getElementById('card_'+tid+'_'+dk);
  if(c) c.classList.toggle('open');
}

function updateStatus(tid,dk,sel){
  const val=sel.value;
  sel.className='status-select '+scls(val);
  const s=gs(); s[tsk(tid,dk)]=val; ss(s);
  const c=document.getElementById('card_'+tid+'_'+dk);
  if(c){ const d=c.querySelector('.status-dot'); if(d) d.className='status-dot '+sdcls(val); }
  renderWeek(); renderSummary();
}

function updateNotes(tid,dk,ta){
  const s=gs(); s[tnk(tid,dk)]=ta.value; ss(s);
}

// ── ALARM ─────────────────────────────────────────────────────────────────
function setAlarm(tid, dk){
  const tb = (gs()[tbtsk(tid,dk)])||{};
  if(!tb.start){
    const el = document.getElementById('remstatus_'+tid+'_'+dk);
    if(el) el.textContent = 'Please set a start time first.';
    return;
  }

  const task = TASKS.find(t=>t.id===tid);
  const label = encodeURIComponent((task ? task.name : 'Study time').slice(0,30));

  // Parse time value (handle next-day n prefix)
  const nextDay = tb.start.startsWith('n');
  const clean = nextDay ? tb.start.slice(1) : tb.start;
  const [h, m] = clean.split(':').map(Number);

  // Android Clock intent — opens default clock app on any Android
  const intentUrl =
    `intent://alarm?hour=${h}&minutes=${m}&message=${label}&vibrate=true&skip_ui=false` +
    `#Intent;action=android.intent.action.SET_ALARM;end`;

  // Update status before opening
  const statusEl = document.getElementById('remstatus_'+tid+'_'+dk);
  if(statusEl) statusEl.textContent = `Opening Clock app for ${fmt12(tb.start)}…`;

  const btn = document.getElementById('rembtn_'+tid+'_'+dk);
  if(btn){ btn.textContent = `Alarm set · ${fmt12(tb.start)}`; btn.classList.add('active'); }

  window.location.href = intentUrl;
}

// ── RENDER WEEK ───────────────────────────────────────────────────────────
function renderWeek(){
  const state=gs(), cont=document.getElementById('week-days'), ti=todayIdx();
  cont.innerHTML='';
  let tDone=0,tSkip=0,tAll=0;

  DAYS.forEach((day,idx)=>{
    const tasks=TASKS.filter(t=>t.days.includes(day.key));
    if(!tasks.length) return;
    const total=tasks.length;
    const done=tasks.filter(t=>(state[tsk(t.id,day.key)]||'pending')==='done').length;
    const part=tasks.filter(t=>(state[tsk(t.id,day.key)]||'pending')==='partial').length;
    const skip=tasks.filter(t=>(state[tsk(t.id,day.key)]||'pending')==='skip').length;
    const counted=done+part+skip;
    tDone+=done+part; tSkip+=skip; tAll+=total;
    const pct=Math.round(counted/total*100);
    const row=document.createElement('div');
    row.className='week-day-row'+(idx===ti?' is-today':'');
    row.onclick=()=>{ curIdx=idx; switchTab('today'); };
    const ofc=tasks.some(t=>t.type==='office'), hme=tasks.some(t=>t.type==='home'), bot=tasks.some(t=>t.type==='both');
    row.innerHTML=`
      <div>
        <div class="wdr-name">${day.short}${idx===ti?' <span style="color:var(--blue);font-size:10px">today</span>':''}</div>
        <div class="wdr-date">${day.date}</div>
      </div>
      <div class="wdr-bar-wrap">
        <div class="wdr-bar-track"><div class="wdr-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="wdr-pct">${pct}%</div>
      <div class="wdr-dots">
        ${ofc?`<div class="wdr-dot" style="background:var(--blue)"></div>`:''}
        ${hme?`<div class="wdr-dot" style="background:var(--amber)"></div>`:''}
        ${bot?`<div class="wdr-dot" style="background:var(--purple)"></div>`:''}
      </div>`;
    cont.appendChild(row);
  });

  const dp=tAll?Math.round(tDone/tAll*100):0;
  const lp=tAll?Math.round((tAll-tDone-tSkip)/tAll*100):100;
  document.getElementById('w-done-pct').textContent=dp+'%';
  document.getElementById('w-left-pct').textContent=lp+'%';
  document.getElementById('w-prog').textContent=(tDone+tSkip)+'/'+tAll;
  document.getElementById('w-bar').style.width=dp+'%';
}

// ── RENDER SUMMARY ────────────────────────────────────────────────────────
function renderSummary(){
  const state=gs();
  let tDone=0,tAll=0;
  TASKS.forEach(t=>{ t.days.forEach(dk=>{ tAll++; const v=state[tsk(t.id,dk)]||'pending'; if(v!=='pending') tDone++; }); });
  const pct=tAll?Math.round(tDone/tAll*100):0;
  document.getElementById('s-total-pct').textContent=pct+'%';
  document.getElementById('s-bar').style.width=pct+'%';
  document.getElementById('s-prog').textContent=tDone+' / '+tAll;
  document.getElementById('s-right').textContent=tAll;

  function renderGrp(elId,dotClr,filter){
    const el=document.getElementById(elId); el.innerHTML='';
    TASKS.filter(filter).forEach(t=>{
      const done=t.days.filter(dk=>(state[tsk(t.id,dk)]||'pending')==='done').length;
      const part=t.days.filter(dk=>(state[tsk(t.id,dk)]||'pending')==='partial').length;
      const skip=t.days.filter(dk=>(state[tsk(t.id,dk)]||'pending')==='skip').length;
      const total=t.days.length;
      const comp=Math.round((done+part)/total*100);
      const left=Math.round((total-done-part-skip)/total*100);
      const row=document.createElement('div');
      row.className='s-row';
      row.innerHTML=`
        <div class="s-dot" style="background:${dotClr}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;color:var(--text)">${t.name}</div>
          <div style="font-size:11px;color:var(--hint);margin-top:1px">${t.time} · ${done+part}/${total} sessions done</div>
        </div>
        <div class="s-pcts">
          <div class="s-pct-done" style="color:${dotClr}">${comp}% done</div>
          <div class="s-pct-left">${left}% left</div>
        </div>`;
      el.appendChild(row);
    });
  }

  renderGrp('sum-office','var(--blue)',  t=>t.type==='office');
  renderGrp('sum-home',  'var(--amber)', t=>t.type==='home');
  renderGrp('sum-daily', 'var(--purple)',t=>t.type==='both');
}

// ── TAB SWITCH ────────────────────────────────────────────────────────────
function switchTab(name){
  ['today','week','summary'].forEach(t=>{
    document.getElementById('content-'+t).classList.toggle('active',t===name);
    const tab=document.getElementById('tab-'+t);
    tab.className='tab';
    if(t===name) tab.className='tab active-'+name;
  });
  if(name==='week')    renderWeek();
  if(name==='summary') renderSummary();
}

function resetAll(){
  if(!confirm('Reset ALL progress?')) return;
  localStorage.removeItem(SK);
  renderToday(); renderWeek(); renderSummary();
}

// ── INIT ──────────────────────────────────────────────────────────────────
curIdx = todayIdx();
renderToday();
renderWeek();
renderSummary();
</script>
